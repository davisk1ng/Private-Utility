<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Interactive 3D Chain</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #0f1117;
			--panel: #171b24;
			--panel-border: #2b3040;
			--text: #e7ebf3;
			--muted: #9ca7bf;
			--accent: #4f8cff;
			--danger: #e05252;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Inter, Segoe UI, Arial, sans-serif;
			background: radial-gradient(circle at top, #1a2234 0%, var(--bg) 45%);
			color: var(--text);
			overflow: hidden;
		}

		#app {
			width: 100vw;
			height: 100vh;
			position: relative;
		}

		#ui {
			position: absolute;
			top: 14px;
			left: 14px;
			z-index: 10;
			background: color-mix(in oklab, var(--panel) 80%, transparent);
			border: 1px solid var(--panel-border);
			border-radius: 12px;
			padding: 12px;
			min-width: 250px;
			backdrop-filter: blur(8px);
		}

		#ui h1 {
			margin: 0 0 8px;
			font-size: 16px;
			font-weight: 600;
		}

		#ui p {
			margin: 0 0 10px;
			color: var(--muted);
			font-size: 13px;
			line-height: 1.4;
		}

		.row {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-bottom: 8px;
		}

		button {
			border: 1px solid transparent;
			border-radius: 8px;
			background: var(--accent);
			color: white;
			cursor: pointer;
			padding: 8px 10px;
			font-size: 13px;
			transition: filter 0.2s ease, transform 0.06s ease;
		}

		button:active {
			transform: translateY(1px);
		}

		button:hover {
			filter: brightness(1.1);
		}

		button.secondary {
			background: #25314a;
			border-color: #3e4f74;
		}

		button.danger {
			background: var(--danger);
		}

		#count {
			font-size: 14px;
			font-weight: 600;
			margin-left: auto;
		}

		#hint {
			font-size: 12px;
			color: var(--muted);
			margin-top: 6px;
		}
	</style>
</head>
<body>
	<div id="app">
		<div id="ui">
			<h1>3D Chain</h1>
			<p>
				Orbit: left-drag • Pan: right-drag • Zoom: wheel<br />
				Chain built by repeating one base link (array-style).
			</p>
			<div class="row">
				<button id="addLink">Add Link</button>
				<button id="removeLink" class="danger">Remove Link</button>
				<span id="count">Links: 0</span>
			</div>
			<div class="row">
				<button id="reset" class="secondary">Reset Chain</button>
			</div>
			<div id="hint">
				To use your Blender model, export a single link as
				<strong>assets/chain-link.glb</strong>.
			</div>
		</div>
	</div>

	<script type="module">
		import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";
		import { OrbitControls } from "https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js";
		import { GLTFLoader } from "https://unpkg.com/three@0.164.1/examples/jsm/loaders/GLTFLoader.js";

		const app = document.getElementById("app");
		const addBtn = document.getElementById("addLink");
		const removeBtn = document.getElementById("removeLink");
		const resetBtn = document.getElementById("reset");
		const countLabel = document.getElementById("count");

		const scene = new THREE.Scene();
		scene.background = new THREE.Color("#0f1117");

		const camera = new THREE.PerspectiveCamera(
			55,
			window.innerWidth / window.innerHeight,
			0.1,
			100
		);
		camera.position.set(3.5, 2.4, 4.7);

		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
		renderer.setSize(window.innerWidth, window.innerHeight);
		app.appendChild(renderer.domElement);

		const controls = new OrbitControls(camera, renderer.domElement);
		controls.enableDamping = true;
		controls.target.set(0, 0.5, 0);

		scene.add(new THREE.HemisphereLight("#cfe1ff", "#2f3440", 1.0));

		const dir = new THREE.DirectionalLight("#ffffff", 1.2);
		dir.position.set(3, 5, 2);
		scene.add(dir);

		const floor = new THREE.Mesh(
			new THREE.PlaneGeometry(30, 30),
			new THREE.MeshStandardMaterial({ color: "#161b27", roughness: 0.95 })
		);
		floor.rotation.x = -Math.PI / 2;
		floor.position.y = -1.2;
		scene.add(floor);

		const chainGroup = new THREE.Group();
		scene.add(chainGroup);

		const chainConfig = {
			spacing: 0.68,
			oddRotationY: Math.PI / 2,
			minimumLinks: 1,
			initialLinks: 10,
		};

		let baseLink = null;
		let linkCount = chainConfig.initialLinks;

		function createFallbackLink() {
			const geometry = new THREE.TorusGeometry(0.34, 0.1, 20, 48);
			const material = new THREE.MeshStandardMaterial({
				color: "#8a94ab",
				metalness: 0.85,
				roughness: 0.27,
			});
			const mesh = new THREE.Mesh(geometry, material);
			mesh.rotation.x = Math.PI / 2;
			return mesh;
		}

		function normalizeLinkModel(root) {
			const box = new THREE.Box3().setFromObject(root);
			const size = box.getSize(new THREE.Vector3());
			const maxSide = Math.max(size.x, size.y, size.z);

			if (maxSide > 0) {
				const targetSize = 0.8;
				const scale = targetSize / maxSide;
				root.scale.setScalar(scale);
				root.updateMatrixWorld(true);
			}

			const centeredBox = new THREE.Box3().setFromObject(root);
			const center = centeredBox.getCenter(new THREE.Vector3());
			root.position.sub(center);
			root.updateMatrixWorld(true);
		}

		function cloneLink() {
			return baseLink.clone(true);
		}

		function rebuildChain() {
			chainGroup.clear();

			const offset = ((linkCount - 1) * chainConfig.spacing) / 2;

			for (let i = 0; i < linkCount; i++) {
				const link = cloneLink();
				link.position.set((i * chainConfig.spacing) - offset, 0, 0);

				if (i % 2 === 1) {
					link.rotation.y += chainConfig.oddRotationY;
				}

				link.userData.index = i;
				chainGroup.add(link);
			}

			countLabel.textContent = `Links: ${linkCount}`;
		}

		function addLink() {
			linkCount += 1;
			rebuildChain();
		}

		function removeLink() {
			linkCount = Math.max(chainConfig.minimumLinks, linkCount - 1);
			rebuildChain();
		}

		async function loadBaseLink() {
			const loader = new GLTFLoader();

			try {
				const gltf = await loader.loadAsync("./assets/chain-link.glb");
				baseLink = gltf.scene;
				normalizeLinkModel(baseLink);
			} catch {
				baseLink = createFallbackLink();
			}
		}

		addBtn.addEventListener("click", addLink);
		removeBtn.addEventListener("click", removeLink);
		resetBtn.addEventListener("click", () => {
			linkCount = chainConfig.initialLinks;
			rebuildChain();
		});

		window.addEventListener("resize", () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});

		await loadBaseLink();
		rebuildChain();

		renderer.setAnimationLoop(() => {
			controls.update();
			renderer.render(scene, camera);
		});
	</script>
</body>
</html>
