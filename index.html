<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Chain</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <button id="settingsBtn">Settings</button>

    <!-- Settings Screen -->
    <div id="settingsOverlay" class="overlay hidden"></div>
    <div id="settingsScreen" class="hidden">
        <div id="settingsHeader">
            <span id="settingsTitle">Settings</span>
            <hr id="settingsDivider">
        </div>
        <div id="settingsBody">
            <button id="resetChainBtn">Reset Chain Length</button>
        </div>
    </div>

    <div id="uiControls">
        <button id="addEcho">Add Echo</button>
        <div id="zoomControl">
            <div id="zoomLabel">Zoom</div>
            <div id="zoomRow">
                <span class="zoomSign">+</span>
                <input id="zoomSlider" type="range" min="0" max="100" value="0" aria-label="Zoom slider">
                <span class="zoomSign">-</span>
            </div>
        </div>
    </div>
    <div id="statusMessage">Loading chain model...</div>

    <!-- Echo Labels Container -->
    <div id="echoLabelsContainer"></div>

    <!-- Echo Modal -->
    <div id="echoModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-field">
                <label for="titleInput">Title:</label>
                <input type="text" id="titleInput" placeholder="Enter title">
            </div>
            <div class="modal-field">
                <label for="descriptionInput">Description:</label>
                <textarea id="descriptionInput" placeholder="Enter description"></textarea>
            </div>
            <div class="modal-buttons">
                <button id="confirmEcho">Add Echo</button>
                <button id="cancelEcho">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Hero Card Modal -->
    <div id="heroCardOverlay" class="overlay hidden"></div>
    <div id="heroCard" class="hero-card hidden">
        <div id="heroCardContent"></div>
        <button id="closeHeroCard" class="close-button">Close</button>
    </div>

    <canvas id="chainCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/script.js"></script>

</body>
</html>
